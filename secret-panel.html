<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Sistema - Audios</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .message {
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #00ffcc;
            height: 30px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
        }
        button.audio-btn {
            padding: 15px;
            background-color: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }
        button.audio-btn:hover, button.audio-btn.active {
            background-color: #00ffcc;
            color: #000;
            box-shadow: 0 0 15px #00ffcc;
            transform: scale(1.05);
        }
        button#stop-btn {
            padding: 10px 30px;
            background-color: transparent;
            color: #ff3366;
            border: 2px solid #ff3366;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
            margin-bottom: 30px;
            display: none;
        }
        button#stop-btn:hover {
            background-color: #ff3366;
            color: #fff;
            box-shadow: 0 0 20px #ff3366;
        }
        #qr-container {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            display: inline-block;
        }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div id="qr-container">
            <p style="color: black; text-align: center; margin: 0 0 5px 0; font-weight: bold; font-size: 0.8rem;">Acceso Directo</p>
            <img id="qr-code" src="" alt="QR Code" width="100" height="100" style="display: block; margin: 0 auto;">
        </div>
        <h2 style="margin-top: 15px; text-shadow: 0 0 10px #00ffcc;">PARRILLA DE COMANDOS DE AUDIO</h2>
        <div class="message" id="status-message">Seleccione un archivo para reproducir...</div>
    </div>
    
    <div class="controls">
        <button id="stop-btn">DETENER REPRODUCCIÓN</button>
    </div>

    <!-- Contenedor donde se generará la parrilla -->
    <div class="grid-container" id="grid-container">
        <!-- Los botones se generarán aquí con JavaScript -->
    </div>

    <script>
        // ====== AQUÍ CONFIGURAS TU PARRILLA DE AUDIOS ======
        // Agrega tantos como necesites. 'nombre' es lo que dice el botón, 'ruta' es el archivo.
        const audioList = [
            { nombre: "10 Min Por Cerrar", ruta: "audios/10min por cerrar.mp3" },
            { nombre: "Agradece Confianza", ruta: "audios/Agradece tu confianza.mp3" },
            { nombre: "Cierre del Gym", ruta: "audios/Cierre del gym.mp3" },
            { nombre: "Motivación 1", ruta: "audios/Motivacion 1.mp3" },
            { nombre: "Motivación 2", ruta: "audios/Motivacion 2.mp3" },
            { nombre: "Motivación 3", ruta: "audios/Motivacion 3.mp3" }
        ];
        // ===================================================

        let currentAudio = null;
        const statusMessage = document.getElementById('status-message');
        const stopBtn = document.getElementById('stop-btn');
        const gridContainer = document.getElementById('grid-container');

        // Autogenerar código QR con la URL actual
        const qrCode = document.getElementById('qr-code');
        const currentUrl = encodeURIComponent(window.location.href);
        qrCode.src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${currentUrl}`;

        // Construir la parrilla de botones
        audioList.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'audio-btn';
            btn.innerText = item.nombre;
            btn.onclick = () => playAudio(item.ruta, btn, item.nombre);
            gridContainer.appendChild(btn);
        });

        function playAudio(ruta, btnElement, nombre) {
            // Detener el audio actual si hay uno sonando
            stopCurrentAudio();

            currentAudio = new Audio(ruta);
            
            currentAudio.play().then(() => {
                statusMessage.innerText = `Reproduciendo: [ ${nombre} ]`;
                stopBtn.style.display = 'block';
                
                // Resaltar el botón activo
                document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('active'));
                btnElement.classList.add('active');

            }).catch(e => {
                console.log("Error reproduciendo:", e);
                statusMessage.innerText = `Error: No se encontró [ ${nombre} ]`;
            });

            currentAudio.onended = () => {
                statusMessage.innerText = "Reproducción finalizada. Esperando comando...";
                btnElement.classList.remove('active');
                stopBtn.style.display = 'none';
            };
        }

        function stopCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('active'));
                statusMessage.innerText = "Reproducción detenida.";
                stopBtn.style.display = 'none';
            }
        }

        stopBtn.addEventListener('click', stopCurrentAudio);

    </script>
</body>
</html>
