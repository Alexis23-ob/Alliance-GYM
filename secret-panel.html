<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Sistema</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #audio-container {
            display: none;
        }
        .message {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 5px #00ffcc;
        }
        button {
            padding: 12px 24px;
            background-color: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #00ffcc;
        }
        button:hover {
            background-color: #00ffcc;
            color: #000;
        }
        #qr-container {
            margin-top: 30px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }
    </style>
</head>
<body>
    <div class="message" id="status-message">Conexión establecida. Panel listo.</div>
    
    <!-- Botón para iniciar el audio (Los navegadores modernos requieren interacción del usuario para reproducir audio) -->
    <button id="start-btn">Inicializar Secuencia</button>
    
    <!-- Aquí se mostrará el QR de acceso -->
    <div id="qr-container">
        <p style="color: black; text-align: center; margin-top: 0; font-weight: bold;">Acceso Directo</p>
        <img id="qr-code" src="" alt="QR Code" style="display: block; margin: 0 auto;">
    </div>

    <!-- Contenedor de audios -->
    <div id="audio-container"></div>

    <script>
        // ====== AQUÍ AGREGARÁS LOS AUDIOS LUEGO ======
        // Ejemplo: "ruta/a/audio1.mp3"
        const audiosToPlay = [
            // "audio1.mp3",
        ];
        // =============================================

        let currentAudioIndex = 0;

        // Autogenerar código QR con la URL actual
        const qrCode = document.getElementById('qr-code');
        // Usamos location.href para que el QR siempre apunte a donde esté alojado el archivo
        const currentUrl = encodeURIComponent(window.location.href);
        qrCode.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${currentUrl}`;

        // Lógica de reproducción
        document.getElementById('start-btn').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('qr-container').style.display = 'none';
            
            if (audiosToPlay.length > 0) {
                document.getElementById('status-message').innerText = "Sistema Activo. Reproduciendo secuencias...";
                playNextAudio();
            } else {
                document.getElementById('status-message').innerText = "Sistema en espera... (Faltan archivos de audio)";
            }
        });

        function playNextAudio() {
            if (currentAudioIndex < audiosToPlay.length) {
                const audio = new Audio(audiosToPlay[currentAudioIndex]);
                
                audio.play().catch(e => {
                    console.log("Error reproduciendo:", e);
                    document.getElementById('status-message').innerText = "Error al reproducir el archivo de audio.";
                });
                
                audio.onended = function() {
                    currentAudioIndex++;
                    playNextAudio();
                };
            } else {
                document.getElementById('status-message').innerText = "Secuencia finalizada.";
            }
        }
    </script>
</body>
</html>
