<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Sistema - Audios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #2B3036;
            --bg-card: #FFFFFF;
            --primary-color: #E54545;
            --primary-hover: #D03535;
            --secondary-color: #E2E2E2;
            --text-main: #333940;
            --text-muted: #7A828A;
            --text-light: #FFFFFF;
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Roboto', sans-serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        h2 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-top: 25px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        h2 span {
            color: var(--primary-color);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .message {
            font-size: 1.1rem;
            margin-bottom: 10px;
            height: 30px;
            color: var(--secondary-color);
        }
        #main-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .category-section {
            width: 100%;
        }
        .category-title {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            text-transform: uppercase;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
        }
        button.audio-btn {
            padding: 15px;
            background-color: transparent;
            color: var(--text-light);
            border: 2px solid var(--secondary-color);
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        button.audio-btn:hover, button.audio-btn.active {
            background-color: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(230, 43, 46, 0.3);
        }
        button#stop-btn {
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(230, 43, 46, 0.3);
            display: none;
            width: 100%;
        }
        button#stop-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(230, 43, 46, 0.4);
        }
        #qr-container {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: inline-block;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 400px;
        }
        .booster-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .booster-container label {
            font-weight: 500;
            font-family: var(--font-heading);
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="header">
        <div id="qr-container">
            <p style="color: var(--text-main); text-align: center; margin: 0 0 5px 0; font-weight: bold; font-size: 0.8rem; font-family: var(--font-body);">Acceso Directo</p>
            <img id="qr-code" src="" alt="QR Code" width="100" height="100" style="display: block; margin: 0 auto; border-radius: 8px;">
        </div>
        <h2>PARRILLA DE COMANDOS DE <span>AUDIO</span></h2>
        <div class="message" id="status-message">Seleccione un archivo para reproducir...</div>
    </div>
    
    <div class="controls">
        <div class="booster-container">
            <label for="volume-booster"><i class="fas fa-fire" style="color: var(--primary-color);"></i> Amplificador: <span id="vol-percentage">300%</span></label>
            <input type="range" id="volume-booster" min="1" max="10" step="0.5" value="3">
            <small style="font-size: 0.8rem; text-align: center; color: var(--text-muted); font-family: var(--font-body);">Fuerza el volumen por encima del límite del dispositivo. Si suena raro o distorsionado, bájalo.</small>
        </div>
        <button id="stop-btn">DETENER REPRODUCCIÓN</button>
    </div>

    <!-- Contenedor principal donde se generarán las categorías y parrillas -->
    <div id="main-container">
        <!-- El contenido se generará aquí con JavaScript -->
    </div>

    <!-- Reproductor oculto base -->
    <audio id="main-player" style="display:none;" crossorigin="anonymous"></audio>

    <script>
        // ====== AQUÍ CONFIGURAS TU PARRILLA DE AUDIOS ======
        const audiosPorCategoria = {
            "Reglamento y Normas": [
                { nombre: "Alternar Equipo", ruta: "audios/Alternar equipo.mp3" },
                { nombre: "Limpiar Máquinas", ruta: "audios/Limpiar maquinas.mp3" },
                { nombre: "Regresar Equipo", ruta: "audios/Regresar a su lugar el equipo.mp3" },
                { nombre: "Usar Toalla", ruta: "audios/Usar toalla.mp3" },
                { nombre: "No Azotar Equipo", ruta: "audios/No azotar el equipo.mp3" },
                { nombre: "Cuidar Pertenencias", ruta: "audios/Cuidado de sus pertenencias.mp3" }
            ],
            "Motivación y Avisos": [
                { nombre: "Motivación 1", ruta: "audios/Motivacion 1.mp3" },
                { nombre: "Motivación 2", ruta: "audios/Motivacion 2.mp3" },
                { nombre: "Motivación 3", ruta: "audios/Motivacion 3.mp3" },
                { nombre: "Agradece Confianza", ruta: "audios/Agradece tu confianza.mp3" },
                { nombre: "Redes Sociales", ruta: "audios/Redes sociales del GYM.mp3" }
            ],
            "Cierre de Instalaciones": [
                { nombre: "10 Min Por Cerrar", ruta: "audios/10min por cerrar.mp3" },
                { nombre: "Cierre del Gym", ruta: "audios/Cierre del gym.mp3" }
            ]
        };
        // ===================================================

        const statusMessage = document.getElementById('status-message');
        const stopBtn = document.getElementById('stop-btn');
        const mainContainer = document.getElementById('main-container');
        const player = document.getElementById('main-player');
        
        // Elementos del amplificador
        const boosterSlider = document.getElementById('volume-booster');
        const volPercentage = document.getElementById('vol-percentage');

        let audioContext = null;
        let gainNode = null;
        let track = null;
        let currentBtn = null;

        // Autogenerar código QR con la URL actual
        const qrCode = document.getElementById('qr-code');
        const currentUrl = encodeURIComponent(window.location.href);
        qrCode.src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${currentUrl}`;

        // Inicializar el motor de audio (Web Audio API)
        function initAudioContext() {
            if (!audioContext) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContext();
                
                track = audioContext.createMediaElementSource(player);
                gainNode = audioContext.createGain();
                
                // Conectar nodos: Reproductor -> Amplificador -> Altavoces
                track.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                // Setear valor inicial
                gainNode.gain.value = boosterSlider.value;
            }
        }

        // Evento del slider del amplificador
        boosterSlider.addEventListener('input', function() {
            const val = this.value;
            volPercentage.innerText = Math.round(val * 100) + '%';
            if (gainNode) {
                gainNode.gain.value = val;
            }
        });

        // Construir la parrilla por categorías
        for (const [categoria, audios] of Object.entries(audiosPorCategoria)) {
            const section = document.createElement('div');
            section.className = 'category-section';

            const title = document.createElement('h3');
            title.className = 'category-title';
            title.innerText = categoria;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'category-grid';

            audios.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'audio-btn';
                btn.innerText = item.nombre;
                btn.onclick = () => playAudio(item.ruta, btn, item.nombre);
                grid.appendChild(btn);
            });

            section.appendChild(grid);
            mainContainer.appendChild(section);
        }

        function playAudio(ruta, btnElement, nombre) {
            initAudioContext();
            
            // Reanudar el contexto si estaba suspendido (políticas de seguridad de navegadores)
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            // Quitar clase activa a todos
            document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('active'));
            currentBtn = btnElement;

            player.src = ruta;
            player.play().then(() => {
                statusMessage.innerText = `Reproduciendo: [ ${nombre} ]`;
                stopBtn.style.display = 'block';
                btnElement.classList.add('active');
            }).catch(e => {
                console.log("Error reproduciendo:", e);
                statusMessage.innerText = `Error: No se encontró [ ${nombre} ]`;
            });

            player.onended = () => {
                statusMessage.innerText = "Reproducción finalizada. Esperando comando...";
                if(currentBtn) currentBtn.classList.remove('active');
                stopBtn.style.display = 'none';
            };
        }

        stopBtn.addEventListener('click', () => {
            player.pause();
            player.currentTime = 0; // Regresar al inicio
            document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('active'));
            statusMessage.innerText = "Reproducción detenida.";
            stopBtn.style.display = 'none';
        });

    </script>
</body>
</html>
